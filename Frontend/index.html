<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Traffic Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="toolbar">
    <div class="toolbar-left">
      <button id="btn-refresh">Refresh Roads</button>
      <button id="btn-toggle-sim" class="primary">Start Traffic</button>

      <!-- ✅ NEW VIEW TOGGLE -->
      <div class="view-toggle">
        <label class="switch">
          <input type="checkbox" id="viewToggle">
          <span class="slider round"></span>
        </label>
        <span id="viewLabel">Heatmap</span>
      </div>

      <!-- 🚦 TRAFFIC LIGHT TOGGLE -->
      <div class="view-toggle">
        <label class="switch">
          <input type="checkbox" id="lightsToggle" checked>
          <span class="slider round"></span>
        </label>
        <span>Traffic Lights</span>
      </div>

    </div>
    <div class="toolbar-right">
      <span id="status" class="status-inline">Ready.</span>
    </div>
  </header>

  <main>
    <div id="time-controls" class="map-overlay">
      <div class="control-group">
        <label for="hourSlider">
          <b>Time of Day:</b>
          <span id="hourLabel">12:00 PM</span>
        </label>
        <input type="range" id="hourSlider" min="0" max="23" value="12" step="1">
      </div>

      <div class="stats-group">
        <small>Traffic Volume: <span id="vol-mult">100%</span></small><br>
        <small>Average Speed: <span id="speed-mult">100%</span></small>
      </div>
    </div>

    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./script.js"></script>
</body>
</html>
