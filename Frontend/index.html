<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Traffic Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="toolbar">
    <div class="toolbar-left">
      <button id="btn-refresh">Refresh Roads</button>
      <button id="btn-toggle-sim" class="primary">Start</button>

      <!-- Heatmap/Cars toggle -->
      <div class="view-toggle">
        <span id="viewLabel">Heatmap</span>
        <label class="switch">
          <input type="checkbox" id="viewToggle" />
          <span class="slider"></span>
        </label>
      </div>

      <!-- 🚦 Traffic lights toggle -->
      <div class="view-toggle">
        <span>Traffic Lights</span>
        <label class="switch">
          <input type="checkbox" id="lightsToggle" checked />
          <span class="slider"></span>
        </label>
      </div>

      <!-- 🛑 Stop signs toggle -->
      <div class="view-toggle">
        <span>Stop Signs</span>
        <label class="switch">
          <input type="checkbox" id="stopsToggle" checked />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="toolbar-right">
      <span id="status" class="status-inline">Ready.</span>
    </div>
  </header>

  <main>
    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./script.js"></script>
</body>
</html>
