<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Traffic Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="toolbar">
    <div class="toolbar-left">
      <button id="btn-refresh">Refresh Roads</button>
      <button id="btn-toggle-sim" class="primary">Start</button>

      <!-- Heatmap/Cars toggle -->
      <div class="view-toggle">
        <span id="viewLabel">Heatmap</span>
        <label class="switch">
          <input type="checkbox" id="viewToggle" />
          <span class="slider"></span>
        </label>
      </div>

      <!-- 🚦 Traffic lights toggle -->
      <div class="view-toggle">
        <span>Traffic Lights</span>
        <label class="switch">
          <input type="checkbox" id="lightsToggle" checked />
          <span class="slider"></span>
        </label>
      </div>

      <!-- 🛑 Stop signs toggle -->
      <div class="view-toggle">
        <span>Stop Signs</span>
        <label class="switch">
          <input type="checkbox" id="stopsToggle" checked />
          <span class="slider"></span>
        </label>
      </div>

      <!-- 🤖 Signal model toggle -->
      <button id="btn-signal-mode" class="signal-mode-btn" title="Switch traffic light model">
        <span id="signal-mode-icon">📂</span>
        <span id="signal-mode-label">Pretrained</span>
      </button>
    </div>

    <div class="toolbar-right">
      <span id="status" class="status-inline">Ready.</span>
    </div>
  </header>

  <main>
    <!-- ⏱️ Overlay: Time + multipliers -->
    <div class="map-overlay" id="time-controls">
      <div class="control-group">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
          <div style="font-weight:700;">Time</div>
          <div id="hourLabel" style="font-weight:700;">12:00 PM</div>
        </div>

        <input id="hourSlider" type="range" min="0" max="23" step="1" value="12" />
      </div>

      <div class="stats-group">
        <div style="display:flex; justify-content:space-between; padding-top:6px;">
          <span>Traffic Volume</span>
          <span id="vol-mult">100%</span>
        </div>
        <div style="display:flex; justify-content:space-between; padding-top:6px;">
          <span>Avg Speed</span>
          <span id="speed-mult">100%</span>
        </div>
      </div>
    </div>

    <div id="map"></div>

    <!-- 📊 Wait Stats Panel -->
    <div class="wait-stats-panel" id="wait-stats-panel">
      <div class="wait-stats-header">
        <span>🚦 Signal Wait Times</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span id="wait-mode-badge" class="mode-badge pretrained">PRETRAINED</span>
          <button id="btn-wait-collapse" class="wait-collapse-btn" title="Hide panel">▾</button>
        </div>
      </div>

      <div class="wait-city-row">
        <div class="wait-city-stat">
          <div id="city-avg-wait">—</div>
          <div class="wait-label">City Avg</div>
        </div>
        <div class="wait-city-stat">
          <div id="city-max-wait">—</div>
          <div class="wait-label">Max Wait</div>
        </div>
        <div class="wait-city-stat">
          <div id="city-total-vehs">—</div>
          <div class="wait-label">Vehicles</div>
        </div>
      </div>

      <div class="wait-table-wrap">
        <table class="wait-table">
          <thead>
            <tr>
              <th>Intersection</th>
              <th>Avg Wait</th>
              <th>Max</th>
              <th>Cycle</th>
              <th>N/S Split</th>
            </tr>
          </thead>
          <tbody id="wait-table-body">
            <tr><td colspan="5" style="text-align:center;opacity:0.5">Start simulation to see data</td></tr>
          </tbody>
        </table>
      </div>

      <div class="wait-sim-time">Sim time: <span id="wait-sim-time">0s</span></div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./script.js"></script>
</body>
</html>
